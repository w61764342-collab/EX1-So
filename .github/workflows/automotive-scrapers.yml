name: Automotive Scrapers

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 3 AM UTC
  workflow_dispatch:
    inputs:
      category:
        description: 'Specific category to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - Automotive-Cars-and-Trucks
          - bikes
          - Wanted-Cars
          - Used Car
          - New Car
          - Rest-Automotive-Part1
          - Rest-Automotive-Part2
          - Rest-Automotive-Part3

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        category: 
          - Automotive-Cars-and-Trucks
          - bikes
          - Wanted-Cars
          - Used Car
          - New Car
          - Rest-Automotive-Part1
          - Rest-Automotive-Part2
          - Rest-Automotive-Part3
      fail-fast: false  # Continue running other scrapers even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run ${{ matrix.category }} scraper
        if: ${{ !github.event.inputs.category || github.event.inputs.category == matrix.category }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          cd "${{ matrix.category }}"
          if [ "${{ matrix.category }}" = "Used Car" ]; then
            python main_used_cars.py
          else
            python main.py
          fi
